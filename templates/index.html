<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CrashML</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(255,255,255,0.12);padding:.9rem 2rem;display:flex;gap:1rem;align-items:center}
nav a{color:#fff;text-decoration:none;font-size:.9rem;padding:.4rem .9rem;border-radius:6px;transition:.2s}
nav a:hover{background:rgba(255,255,255,.2)}
nav .logo{font-weight:700;font-size:1.1rem;margin-right:auto}
.hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem}
.hero-content{color:#fff}
.hero h1{font-size:3rem;font-weight:800;text-shadow:2px 2px 8px rgba(0,0,0,.3);margin-bottom:1rem}
.hero p{font-size:1.1rem;opacity:.9;margin-bottom:2.5rem;max-width:500px;margin-left:auto;margin-right:auto}
.btn-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{padding:.85rem 2rem;border-radius:30px;border:none;cursor:pointer;font-size:1rem;font-weight:700;text-decoration:none;transition:.2s}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.btn-white{background:#fff;color:#764ba2}
.btn-outline{background:transparent;border:2px solid #fff;color:#fff}
</style>
</head>
<body>
<nav>
  <span class="logo">🚗 CrashML</span>
  <a href="/">Home</a>
  <a href="/showsc">Predict</a>
  <a href="/dashboard">Dashboard</a>
  <a href="/explorer">Data Explorer</a>
  <a href="/s3">☁️ S3</a>
</nav>
<div class="hero">
  <div class="hero-content">
    <h1>🚗 Crash Classification</h1>
    <p>Predict injury likelihood from traffic crash data using machine learning</p>
    <div class="btn-row">
      <a href="/showsc" class="btn btn-white">🔮 Start Predicting</a>
      <a href="/dashboard" class="btn btn-outline">📊 View Dashboard</a>
    </div>
  </div>
</div>
</body>
</html>
